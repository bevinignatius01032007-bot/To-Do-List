<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Focused Clarity</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>

<body class="bg-gradient-to-br from-blue-50 to-blue-100">

  <!-- Navigation -->
  <nav class="flex justify-between items-center px-8 py-4 bg-white/80 backdrop-blur sticky top-0 z-50 shadow-sm">
    <a href="index.html" class="flex items-center gap-2">
      <span class="text-2xl font-bold text-blue-600">✓</span>
      <h1 class="text-xl font-bold text-gray-900">Focused Clarity</h1>
    </a>
  </nav>

  <!-- Login Container -->
  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
      
      <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-gray-900 mb-2">Welcome Back</h2>
        <p class="text-gray-600">Sign in to continue to your dashboard</p>
      </div>

      <form class="space-y-6">
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
          <input type="email" placeholder="you@example.com" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
          <input type="password" placeholder="••••••••" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2">
            <input type="checkbox" class="w-4 h-4 rounded">
            <span class="text-sm text-gray-600">Remember me</span>
          </label>
          <a href="#" class="text-sm text-blue-600 hover:text-blue-700">Forgot password?</a>
        </div>

        <a href="app.html" class="w-full block text-center py-3 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition">
          Sign In
        </a>

      </form>

      <div class="mt-8 pt-8 border-t border-gray-200 text-center">
        <p class="text-gray-600">Don't have an account? <a href="signup.html" class="text-blue-600 font-semibold hover:text-blue-700">Sign up</a></p>
      </div>

    </div>
  </div>

</body>
</html>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <meta name="google-signin-client_id" content="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com">
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "primary": "#0058be",
            "on-primary": "#ffffff",
            "primary-container": "#2170e4",
            "on-primary-container": "#fefcff",
            "secondary-container": "#d0e1fb",
            "on-secondary-container": "#54647a",
            "surface": "#f8f9fa",
            "surface-container": "#edeeef",
            "surface-container-highest": "#e1e3e4",
            "on-surface": "#191c1d",
            "on-surface-variant": "#424754",
            "outline-variant": "#c2c6d6",
            "error": "#ba1a1a",
            "error-container": "#ffdad6",
          },
          "fontFamily": {
            "label-md": ["Inter"],
            "body-md": ["Inter"],
            "headline-md": ["Inter"],
          },
          "fontSize": {
            "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
            "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
            "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
          }
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body data-page="login" class="bg-surface text-on-surface min-h-screen flex items-center justify-center px-4">
  <main class="w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="font-headline-md text-headline-md text-primary font-bold mb-2">Welcome Back</h1>
      <p class="font-body-md text-body-md text-on-surface-variant">Sign in to access your tasks</p>
    </div>

    <form id="login-form" class="space-y-4" autocomplete="off">
      <div>
        <label class="block font-label-md text-label-md text-on-surface mb-2">Email Address</label>
        <input id="login-email" class="w-full bg-surface-container border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary/30" type="email" placeholder="you@example.com" required />
      </div>

      <div>
        <label class="block font-label-md text-label-md text-on-surface mb-2">Password</label>
        <input id="login-password" class="w-full bg-surface-container border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary/30" type="password" placeholder="Enter password" required />
      </div>

      <button type="submit" class="w-full bg-primary text-on-primary font-label-md text-label-md py-3 px-6 rounded-xl hover:opacity-90 active:scale-95 transition-all shadow-sm font-bold">Log In</button>

      <div id="login-error" class="text-error font-label-md text-label-md text-center"></div>
    </form>

    <div class="mt-6 text-center space-y-3">
      <p class="font-body-md text-body-md text-on-surface-variant">
        <a href="#" id="forgot-password" class="text-primary hover:underline">Forgot password?</a>
      </p>
      <p class="font-body-md text-body-md text-on-surface-variant">
        Don't have an account? <a href="signup.html" class="text-primary hover:underline font-bold">Sign up</a>
      </p>
    </div>

    <div class="fixed top-6 right-6">
      <button id="theme-toggle" class="w-10 h-10 flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
        <span class="material-symbols-outlined">dark_mode</span>
      </button>
    </div>
  </main>

<script src="https://apis.google.com/js/platform.js" async defer></script>
<script src="app.js" defer></script>
</body>
</html>
